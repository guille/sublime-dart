syntax: "Dart.sublime-syntax"
comment_char: "//"
tests:
  - line: "items?..add(1)..clear();"
    assertions:
      - span: "items"
        scopes: [variable.other.readwrite.dart]
      - span: "?.."
        scopes: [punctuation.accessor.dart]
      - span: "add"
        scopes: [variable.function.dart]
      - span: "1"
        scopes: [constant.numeric.integer.decimal.dart]
      - span: ".."
        scopes: [punctuation.accessor.dart]
        nth: 1
      - span: "clear"
        scopes: [variable.function.dart]

  - line: "callback?.call();"
    assertions:
      - span: "callback"
        scopes: [variable.other.readwrite.dart]
      - span: "?."
        scopes: [punctuation.accessor.dart]

  - line: "value = condition ? left : right;"
    assertions:
      - span: "value"
        scopes: [variable.other.readwrite.dart]
      - span: "="
        scopes: [keyword.operator.assignment.dart]
      - span: "?"
        scopes: [keyword.operator.ternary.dart]
      - span: ":"
        scopes: [keyword.operator.ternary.dart]

  - line: "value = condition ? left?.value ?? fallback : right?.value;"
    assertions:
      - span: "?"
        scopes: [keyword.operator.ternary.dart]
      - span: "?."
        scopes: [punctuation.accessor.dart]
        nth: 0
      - span: "??"
        scopes: [keyword.operator.null-coalescing.dart]
      - span: ":"
        scopes: [keyword.operator.ternary.dart]
      - span: "?."
        scopes: [punctuation.accessor.dart]
        nth: 1

  - line: "value = primary ?? fallback;"
    assertions:
      - span: "??"
        scopes: [keyword.operator.null-coalescing.dart]

  - line: "result ??= other as String;"
    assertions:
      - span: "??="
        scopes: [keyword.operator.assignment.dart]
      - span: "as"
        scopes: [keyword.operator.word.dart]
      - span: "String"
        scopes: [storage.type.dart]

  - line: "flag = value is! int && !done;"
    assertions:
      - span: "is"
        scopes: [keyword.operator.word.dart]
      - span: "!"
        scopes: [keyword.operator.logical.dart]
        nth: 0
      - span: "int"
        scopes: [storage.type.dart]
      - span: "&&"
        scopes: [keyword.operator.logical.dart]
      - span: "!"
        scopes: [keyword.operator.logical.dart]
        nth: 1

  - line: "final data = <String, List<int>>{};"
    assertions:
      - span: "String"
        scopes: [meta.generic.dart, storage.type.dart]
      - span: "List"
        scopes: [meta.generic.dart, support.type.dart]
      - span: "int"
        scopes: [meta.generic.dart, storage.type.dart]
      - span: "{"
        scopes: [punctuation.section.block.begin.dart]
      - span: "}"
        scopes: [punctuation.section.block.end.dart]

  - line: "List<Piece?> board = []..length = 128;"
    assertions:
      - span: "List"
        scopes: [support.type.dart]
      - span: "Piece"
        scopes: [meta.generic.dart, support.type.dart]
      - span: "?"
        scopes: [meta.generic.dart, storage.type.optional.dart]
      - span: "board"
        scopes: [variable.other.readwrite.dart]

  - line: "final data = <String, List<Piece?>>{};"
    assertions:
      - span: "String"
        scopes: [meta.generic.dart, storage.type.dart]
      - span: "List"
        scopes: [meta.generic.dart, support.type.dart]
      - span: "Piece"
        scopes: [meta.generic.dart, support.type.dart]
      - span: "?"
        scopes: [meta.generic.dart, storage.type.optional.dart]

  - line: "final callback = Mapper<int>.from(source);"
    assertions:
      - span: "Mapper"
        scopes: [support.class.dart]
      - span: "int"
        scopes: [meta.generic.dart, storage.type.dart]
      - span: "."
        scopes: [punctuation.accessor.dart]
      - span: "from"
        scopes: [variable.function.dart]

  - line: "final board = Chess.fromFEN(fen, check_validity: false);"
    assertions:
      - span: "Chess"
        scopes: [support.class.dart]
      - span: "fromFEN"
        scopes: [variable.function.dart]
      - span: "check_validity"
        scopes: [variable.parameter.dart]

  - line: "_previewCodeGenerator = PreviewCodeGenerator();"
    assertions:
      - span: "_previewCodeGenerator"
        scopes: [variable.other.readwrite.dart]
      - span: "PreviewCodeGenerator"
        scopes: [support.class.dart]

  - line: "PreviewCodeGenerator generator = PreviewCodeGenerator();"
    assertions:
      - span: "PreviewCodeGenerator"
        scopes: [support.type.dart]
        nth: 0
      - span: "generator"
        scopes: [variable.other.readwrite.dart]
      - span: "PreviewCodeGenerator"
        scopes: [support.class.dart]
        nth: 1

  - line: "final parsed = int.parse('1');"
    assertions:
      - span: "int"
        scopes: [support.class.dart]
      - span: "parse"
        scopes: [variable.function.dart]
        nth: 1

  - line: "WebServerDevice.showWebServerDevice = true;"
    assertions:
      - span: "WebServerDevice"
        scopes: [support.class.dart]
      - span: "."
        scopes: [punctuation.accessor.dart]
      - span: "showWebServerDevice"
        scopes: [variable.other.readwrite.dart]
      - span: "true"
        scopes: [constant.language.dart]

  - line: "final values = List<int>.filled(2, 0);"
    assertions:
      - span: "List"
        scopes: [support.class.dart]
      - span: "int"
        scopes: [meta.generic.dart, storage.type.dart]
      - span: "filled"
        scopes: [variable.function.dart]

  - line: "final casted = value as PreviewCodeGenerator;"
    assertions:
      - span: "as"
        scopes: [keyword.operator.word.dart]
        nth: 1
      - span: "PreviewCodeGenerator"
        scopes: [support.type.dart]

  - line: "if (value is PreviewCodeGenerator) {}"
    assertions:
      - span: "is"
        scopes: [keyword.operator.word.dart]
      - span: "PreviewCodeGenerator"
        scopes: [support.type.dart]

  - line: "label: while (true) break label;"
    assertions:
      - span: "label"
        scopes: [entity.name.label.dart]
        nth: 0
      - span: ":"
        scopes: [punctuation.separator.colon.dart]
      - span: "while"
        scopes: [keyword.control.dart]
      - span: "true"
        scopes: [constant.language.dart]
      - span: "break"
        scopes: [keyword.control.dart]
      - span: "label"
        scopes: [variable.other.readwrite.dart]
        nth: 1

  - line: "await for (final item in items) yield item;"
    assertions:
      - span: "await"
        scopes: [keyword.control.dart]
      - span: "for"
        scopes: [keyword.control.dart]
      - span: "final"
        scopes: [storage.modifier.dart]
      - span: "in"
        scopes: [keyword.control.dart]
        nth: 1
      - span: "yield"
        scopes: [keyword.control.dart]
