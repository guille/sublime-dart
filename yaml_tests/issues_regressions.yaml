syntax: "Dart.sublime-syntax"
comment_char: "//"
tests:
  - line: "enum Planet { final double mass; }"
    assertions:
      - span: "final"
        scopes: [meta.enum.body.dart, storage.modifier.dart]
      - span: "double"
        scopes: [meta.enum.body.dart, storage.type.dart]
      - span: "mass"
        scopes: [meta.enum.body.dart, variable.other.readwrite.dart]

  - line: "var buffers = charCodes.map(StringBuffer.new);"
    assertions:
      - span: "var"
        scopes: [storage.modifier.dart]
      - span: "buffers"
        scopes: [variable.other.readwrite.dart]
      - span: "charCodes"
        scopes: [variable.other.dart]
      - span: "map"
        scopes: [variable.function.dart]
      - span: "StringBuffer"
        scopes: [support.type.dart]
      - span: "new"
        scopes: [keyword.operator.word.dart]

  - line: "class Circle extends Shape {}"
    assertions:
      - span: "extends"
        scopes: [meta.class.dart, keyword.declaration.class.inheritance.dart]
      - span: "Shape"
        scopes: [meta.class.dart, entity.other.inherited-class.dart]

  - line: "Circle(color: 'red', radius: 5.0)"
    assertions:
      - span: "color"
        scopes: [variable.parameter.dart]
      - span: "radius"
        scopes: [variable.parameter.dart]
      - span: "'red'"
        scopes: [string.quoted.single.dart]
      - span: "5.0"
        scopes: [constant.numeric.float.dart]

  - line: "String get label => '${runtimeType}#$id';"
    assertions:
      - span: "runtimeType"
        scopes: [meta.interpolation.dart, source.dart.embedded, variable.other.readwrite.dart]
      - span: "$id"
        scopes: [meta.interpolation.dart, variable.interpolation.dart]

  - line: "_ = ordered; // suppress unused warning"
    assertions:
      - span: "_"
        scopes: [variable.language.anonymous.dart]
      - span: "ordered"
        scopes: [variable.other.readwrite.dart]

  - line: "List<T> myMap<T, U>(List<U> list, T Function(U) f) => [for (final x in list) f(x)];"
    assertions:
      - span: "List"
        scopes: [support.type.dart]
        nth: 0
      - span: "myMap"
        scopes: [meta.function.dart, entity.name.function.dart]
      - span: "T"
        scopes: [meta.function.dart, meta.generic.dart, entity.name.type.parameter.dart]
        nth: 1
      - span: "U"
        scopes: [meta.function.dart, meta.generic.dart, entity.name.type.parameter.dart]
        nth: 0
      - span: "Function"
        scopes: [meta.function.parameters.dart, storage.type.dart]
      - span: "f"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]

  - line: "throw ArgumentError('Invalid ID: $id');"
    assertions:
      - span: "throw"
        scopes: [keyword.control.dart]
      - span: "ArgumentError"
        scopes: [support.type.dart]

  - line: "return _expensiveWork(n);"
    assertions:
      - span: "return"
        scopes: [keyword.control.dart]
      - span: "_expensiveWork"
        scopes: [variable.function.dart]

  - line: "await runZonedGuarded();"
    assertions:
      - span: "await"
        scopes: [keyword.control.dart]
      - span: "runZonedGuarded"
        scopes: [variable.function.dart]

  - line: "if (is_digit(piece)) {}"
    assertions:
      - span: "if"
        scopes: [keyword.control.dart]
      - span: "is_digit"
        scopes: [variable.function.dart]
      - span: "{"
        scopes: [punctuation.section.block.begin.dart]

  - line: "while (matches(value) && other()) {}"
    assertions:
      - span: "while"
        scopes: [keyword.control.dart]
      - span: "matches"
        scopes: [variable.function.dart]
      - span: "other"
        scopes: [variable.function.dart]
      - span: "&&"
        scopes: [keyword.operator.logical.dart]

  - line: "boardPart.split('').where((elem) => elem == 'K').length;"
    assertions:
      - span: "split"
        scopes: [variable.function.dart]
      - span: "where"
        scopes: [variable.function.dart]
      - span: "=>"
        scopes: [keyword.operator.arrow.dart]

  - line: "callbacks.map(({required int value}) => value).toList();"
    assertions:
      - span: "map"
        scopes: [variable.function.dart]
      - span: "=>"
        scopes: [keyword.operator.arrow.dart]
      - span: "toList"
        scopes: [variable.function.dart]

  - line: "class Either<L> { factory Either.left(L value) => Either._left(value); }"
    assertions:
      - span: "factory"
        scopes: [meta.function.constructor.dart, keyword.declaration.function.dart]
      - span: "Either"
        scopes: [meta.function.constructor.dart, entity.name.class.dart]
        nth: 1
      - span: "left"
        scopes: [meta.function.constructor.dart, entity.name.function.constructor.dart]

  - line: "class Shape { const Shape({required this.color}); }"
    assertions:
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
      - span: "this"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "color"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]

  - line: "class Rectangle extends Shape { const Rectangle({required super.color, required this.width, required this.height}); }"
    assertions:
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
        nth: 0
      - span: "super"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "color"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]
        nth: 0
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
        nth: 1
      - span: "this"
        scopes: [meta.function.parameters.dart, variable.language.dart]
        nth: 0
      - span: "width"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
        nth: 2
      - span: "this"
        scopes: [meta.function.parameters.dart, variable.language.dart]
        nth: 1
      - span: "height"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]

  - line: "class Circle extends Shape { Circle({super.color, this.radius}); }"
    assertions:
      - span: "super"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "color"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]
      - span: "this"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "radius"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]

  - line: "class Circle extends Shape { const Circle({required super.color, required this.radius}); }"
    assertions:
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
        nth: 0
      - span: "super"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "color"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
        nth: 1
      - span: "this"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "radius"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]

  - line: "class Circle extends Shape {"

  - line: "  Circle({"
    assertions:
      - span: "Circle"
        scopes: [meta.function.constructor.dart, entity.name.class.dart]
      - span: "{"
        scopes: [meta.function.parameters.dart, punctuation.section.parameters.begin.dart]

  - line: "    required super.color,"
    assertions:
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
      - span: "super"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "color"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]

  - line: "    required this.radius})"
    assertions:
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
      - span: "this"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "radius"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]

  - line: "      : assert(radius > 0, 'Radius must be positive');"
    assertions:
      - span: ":"
        scopes: [punctuation.separator.colon.dart]
      - span: "assert"
        scopes: [keyword.control.dart]

  - line: "}"

  - line: "class Rectangle extends Shape {"

  - line: "  const Rectangle({"
    assertions:
      - span: "const"
        scopes: [storage.modifier.dart]
      - span: "Rectangle"
        scopes: [meta.function.constructor.dart, entity.name.class.dart]

  - line: "    required super.color,"
    assertions:
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
      - span: "super"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "color"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]

  - line: "    required this.width,"
    assertions:
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
      - span: "this"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "width"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]

  - line: "    required this.height,"
    assertions:
      - span: "required"
        scopes: [meta.function.parameters.dart, keyword.declaration.parameter.dart]
      - span: "this"
        scopes: [meta.function.parameters.dart, variable.language.dart]
      - span: "height"
        scopes: [meta.function.parameters.dart, variable.parameter.dart]

  - line: "  });"
    assertions:
      - span: "}"
        scopes: [meta.function.parameters.dart, punctuation.section.parameters.end.dart]

  - line: "}"

  - line: "static const int Foo = 6;"
    assertions:
      - span: "static"
        scopes: [storage.modifier.dart]
      - span: "const"
        scopes: [storage.modifier.dart]
      - span: "int"
        scopes: [storage.type.dart]

  - line: "switch (value) { case 0: return 1; default: throw StateError('x'); }"
    assertions:
      - span: "switch"
        scopes: [keyword.control.dart]
      - span: "case"
        scopes: [keyword.control.dart]
      - span: "return"
        scopes: [keyword.control.dart]
      - span: "default"
        scopes: [keyword.control.dart]
      - span: "throw"
        scopes: [keyword.control.dart]

  - line: "switch (token) { case 'x' when isLetter(token): return 1; default: return 0; }"
    assertions:
      - span: "switch"
        scopes: [keyword.control.dart]
      - span: "case"
        scopes: [keyword.control.dart]
      - span: "when"
        scopes: [keyword.control.dart]
      - span: "isLetter"
        scopes: [variable.function.dart]
      - span: "return"
        scopes: [keyword.control.dart]
        nth: 0
      - span: "default"
        scopes: [keyword.control.dart]

  - line: "final score = switch (token) { 'x' when isLetter(token) => 1, _ => 0 };"
    assertions:
      - span: "switch"
        scopes: [keyword.control.dart]
      - span: "when"
        scopes: [keyword.control.dart]
      - span: "isLetter"
        scopes: [variable.function.dart]
      - span: "=>"
        scopes: [keyword.operator.arrow.dart]
        nth: 0
